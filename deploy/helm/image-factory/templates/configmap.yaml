apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "image-factory.fullname" . }}
  namespace: {{ include "image-factory.namespace" . }}
  labels:
    {{- include "image-factory.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- $cfg := .Values.config | default dict | deepCopy }}
    {{- if and .Values.auth.enabled (not (hasKey $cfg "authentication")) }}
    {{- $_ := set $cfg "authentication" (dict "enabled" true "htpasswdPath" .Values.auth.htpasswdPath) }}
    {{- end }}
    {{- $cfg | toYamlPretty | nindent 4 }}
