apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      test "$(kubectl -n $NAMESPACE get deploy image-factory -o jsonpath='{.spec.template.spec.volumes[?(@.name=="grype-db")].persistentVolumeClaim.claimName}')" = "e2e-grype-existing"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-factory
status:
  replicas: 1
  availableReplicas: 1
  readyReplicas: 1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: e2e-grype-existing
status:
  phase: Bound
